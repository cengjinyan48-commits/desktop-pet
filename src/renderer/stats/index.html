<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计面板</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background: #1e1c1a; color: #d8d0c8;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden; user-select: none;
    }
    .panel {
      width:100%; height:100%;
      display:flex; flex-direction:column;
      padding: 28px 32px;
    }
    h2 { text-align:center; font-size:18px; font-weight:600; color:#f0c080; margin-bottom:24px; }

    .stat-cards {
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .card .label { font-size:11px; color:#887; margin-bottom:4px; }
    .card .value { font-size:28px; font-weight:700; }
    .card .sub   { font-size:11px; color:#666; margin-top:2px; }
    .value.green  { color:#6c6; }
    .value.orange { color:#f0a040; }
    .value.blue   { color:#6af; }
    .value.pink   { color:#f6a; }

    .streak-bar {
      background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px; text-align:center;
    }
    .streak-bar .label { font-size:11px; color:#887; margin-bottom:6px; }
    .streak-bar .streak-num { font-size:36px; font-weight:700; color:#f0a040; }
    .streak-bar .streak-unit { font-size:14px; color:#aaa; }

    .period-bar {
      display:flex; gap:8px;
    }
    .period-item {
      flex:1; text-align:center;
      background: rgba(255,255,255,0.03);
      border-radius: 8px; padding:10px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .period-item .p-label { font-size:10px; color:#666; margin-bottom:2px; }
    .period-item .p-count { font-size:22px; font-weight:700; }
    .period-item.busiest { border-color: rgba(240,160,64,0.3); background: rgba(240,160,64,0.06); }

    .close-btn {
      margin-top:auto; padding:10px;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:8px; color:#aaa;
      font-size:13px; cursor:pointer; font-family:inherit;
    }
    .close-btn:hover { background: rgba(255,255,255,0.12); color:#ddd; }
  </style>
</head>
<body>
  <div class="panel">
    <h2>📊 统计面板</h2>

    <div class="stat-cards">
      <div class="card">
        <div class="label">📅 今日完成率</div>
        <div class="value green" id="today-rate">--</div>
        <div class="sub" id="today-detail"></div>
      </div>
      <div class="card">
        <div class="label">📆 本周完成率</div>
        <div class="value blue" id="week-rate">--</div>
        <div class="sub" id="week-detail"></div>
      </div>
    </div>

    <div class="streak-bar">
      <div class="label">🔥 连续打卡</div>
      <div><span class="streak-num" id="streak-num">0</span><span class="streak-unit"> 天</span></div>
    </div>

    <div class="period-bar" id="period-bar">
      <div class="period-item" id="p-morning">
        <div class="p-label">☀️ 上午</div>
        <div class="p-count orange" id="cnt-morning">0</div>
      </div>
      <div class="period-item" id="p-afternoon">
        <div class="p-label">🌤️ 下午</div>
        <div class="p-count orange" id="cnt-afternoon">0</div>
      </div>
      <div class="period-item" id="p-evening">
        <div class="p-label">🌙 晚上</div>
        <div class="p-count orange" id="cnt-evening">0</div>
      </div>
    </div>

    <button class="close-btn" id="btn-close">关闭</button>
  </div>

  <script src="./stats.js"></script>
</body>
</html>
