<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>和鱼烧聊天</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-title" id="chat-title">🐱 鱼烧</span>
      <span class="chat-model" id="chat-model"></span>
      <div class="chat-header-btns">
        <button id="chat-clear" title="清空对话">🗑</button>
        <button id="chat-close" title="关闭">✕</button>
      </div>
    </div>

    <div id="chat-messages">
      <div class="msg assistant">
        <div class="msg-bubble" id="welcome-msg">喵～有什么想聊的？我还能帮你记任务、查任务哦 📝</div>
      </div>
    </div>

    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="和鱼烧说点什么… (Enter 发送)" rows="1"></textarea>
      <button id="chat-send" title="发送">↑</button>
    </div>
  </div>

  <script>
    require('./chat.js');
  </script>
</body>
</html>
